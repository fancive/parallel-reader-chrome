name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Build, Test, and E2E Gate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Google Chrome
        id: install-chrome
        run: |
          set -euo pipefail
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub \
            | sudo gpg --dearmor -o /usr/share/keyrings/google-chrome.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/google-chrome.gpg] http://dl.google.com/linux/chrome/deb/ stable main" \
            | sudo tee /etc/apt/sources.list.d/google-chrome.list >/dev/null
          sudo apt-get update -qq
          sudo apt-get install -y google-chrome-stable
          echo "chrome-path=/usr/bin/google-chrome-stable" >> "$GITHUB_OUTPUT"

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit and Contract Tests
        run: npm test

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Audit
        run: npm audit --audit-level=high

      - name: E2E Gate
        env:
          CHROME_PATH: ${{ steps.install-chrome.outputs.chrome-path }}
          E2E_CONTRACT_VALIDATOR_PYTHONPATH: ${{ github.workspace }}/tools/e2e
        run: xvfb-run -a timeout 600 bash .e2e/gate.sh --json

      - name: Upload E2E Artifacts on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-${{ github.run_id }}
          path: |
            .e2e/artifact.json
            .e2e/evidence/
