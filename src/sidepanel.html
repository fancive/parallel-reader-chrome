<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Parallel Reader</title>
    <link rel="stylesheet" href="sidepanel.css" />
  </head>
  <body>
    <section id="action" class="action-panel">
      <div class="action-copy">
        <div class="eyebrow" data-i18n="eyebrowNowReading"></div>
        <p id="status" aria-live="polite" data-i18n="statusWaiting"></p>
      </div>
      <div class="action-controls">
        <button
          id="settings-toggle"
          class="icon-button"
          type="button"
          data-i18n-attr="aria-label:settingsAriaLabel;title:settingsTitle"
        >⚙</button>
        <button id="analyze" class="primary-action" type="button" data-i18n="btnAnalyze"></button>
      </div>
    </section>

    <button id="analyze-hero" class="hero-action" type="button" hidden>
      <span class="hero-action-label" data-i18n="btnAnalyze"></span>
      <span class="hero-action-hint" data-i18n="shortcutHint"></span>
    </button>

    <section id="settings" class="settings-panel" hidden>
      <fieldset class="settings-group" id="settings-group-appearance">
        <legend data-i18n="settingsLegendAppearance"></legend>
        <label><span data-i18n="settingsLabelTheme"></span>
          <select id="theme-select" data-i18n-attr="aria-label:settingsLabelTheme">
            <option value="paper" data-i18n="themeOptionPaper"></option>
            <option value="dark" data-i18n="themeOptionDark"></option>
            <option value="cloud">Claude</option>
          </select>
        </label>
      </fieldset>
      <fieldset class="settings-group" id="settings-group-diagnostics">
        <legend data-i18n="settingsLegendDiagnostics"></legend>
        <label class="settings-checkbox">
          <input id="debug-mode" type="checkbox" />
          <span data-i18n="settingsDebugLabel"></span>
        </label>
      </fieldset>
      <p class="settings-note" data-i18n="settingsLocalModeNote"></p>
      <button id="history-open" class="settings-secondary" type="button" data-i18n="settingsBtnHistory"></button>
      <label><span data-i18n="settingsLabelApiKey"></span>
        <input id="api-key" type="password" placeholder="sk-..." autocomplete="off" />
      </label>
      <label><span data-i18n="settingsLabelBaseUrl"></span>
        <input id="base-url" type="text" />
      </label>
      <label><span data-i18n="settingsLabelModel"></span>
        <input id="model" type="text" />
      </label>
      <label><span data-i18n="settingsLabelCards"></span>
        <span class="row">
          <input id="min-cards" type="number" min="1" />
          <span>—</span>
          <input id="max-cards" type="number" min="1" />
        </span>
      </label>
      <label><span data-i18n="settingsLabelUiLanguage"></span>
        <select id="ui-language">
          <option value="auto" data-i18n="uiLanguageOptionAuto"></option>
          <option value="en" data-i18n="uiLanguageOptionEn"></option>
          <option value="zh_CN" data-i18n="uiLanguageOptionZhCn"></option>
        </select>
      </label>
      <label><span data-i18n="settingsLabelSummaryLanguage"></span>
        <select id="summary-language">
          <option value="zh-CN" data-i18n="summaryLanguageOptionZhCn"></option>
          <option value="en" data-i18n="summaryLanguageOptionEn"></option>
        </select>
      </label>
      <label><span data-i18n="settingsLabelDensity"></span>
        <select id="card-density">
          <option value="concise" data-i18n="densityOptionConcise"></option>
          <option value="normal" data-i18n="densityOptionNormal"></option>
          <option value="detailed" data-i18n="densityOptionDetailed"></option>
        </select>
      </label>
      <label><span data-i18n="settingsLabelMaxDoc"></span>
        <input id="max-doc" type="number" min="500" step="500" />
      </label>
      <label><span data-i18n="settingsLabelCacheTtl"></span>
        <input id="cache-ttl-days" type="number" min="1" max="90" step="1" />
      </label>
      <p id="settings-error" class="settings-error" role="alert" hidden></p>
      <button id="settings-save" type="button" data-i18n="btnSettingsSave"></button>
      <div class="cache-controls">
        <div class="cache-controls-title" data-i18n="cacheControlsTitle"></div>
        <div class="cache-controls-row">
          <button id="cache-clear-current" type="button" data-i18n="btnCacheClearCurrent"></button>
          <span id="cache-clear-current-confirm" class="cache-confirm" hidden>
            <span data-i18n="cacheConfirmText"></span>
            <button id="cache-clear-current-yes" type="button" data-i18n="cacheConfirmYes"></button>
            <button id="cache-clear-current-no" type="button" data-i18n="cacheConfirmNo"></button>
          </span>
        </div>
        <div class="cache-controls-row">
          <button id="cache-clear-all" type="button" data-i18n="btnCacheClearAllPages"></button>
          <span id="cache-clear-all-confirm" class="cache-confirm" hidden>
            <span data-i18n="cacheConfirmAllText"></span>
            <button id="cache-clear-all-yes" type="button" data-i18n="cacheConfirmYes"></button>
            <button id="cache-clear-all-no" type="button" data-i18n="cacheConfirmNo"></button>
          </span>
        </div>
        <p id="cache-status" class="cache-status" aria-live="polite"></p>
      </div>
    </section>

    <section id="stale-cache-banner" class="stale-cache-banner" role="status" hidden>
      <span class="stale-cache-text" data-i18n="staleCacheText"></span>
      <button id="stale-cache-rerun" type="button" data-i18n="btnStaleCacheRerun"></button>
    </section>

    <section id="meta" class="page-state" hidden>
      <div class="page-title-row">
        <span class="meta-label" data-i18n="metaLabelPage"></span>
        <span id="meta-title"></span>
      </div>
      <div class="page-url" id="meta-url"></div>
      <div class="metric-strip debug-only">
        <div class="meta-row"><span class="meta-label" data-i18n="metaLabelText"></span><span id="meta-selected-len"></span></div>
        <div class="meta-row"><span class="meta-label" data-i18n="metaLabelSource"></span><span id="meta-used"></span></div>
      </div>
      <div id="meta-quality" class="meta-quality debug-only" hidden></div>
    </section>

    <details id="stats" class="diagnostics debug-only" hidden>
      <summary data-i18n="diagSummary"></summary>
      <div class="diagnostic-grid">
        <div class="stat"><span class="stat-label" data-i18n="statRawLen"></span><span id="meta-raw-len"></span></div>
        <div class="stat"><span class="stat-label" data-i18n="statReadLen"></span><span id="meta-read-len"></span></div>
        <div class="stat"><span class="stat-label" data-i18n="statRawMatch"></span><span id="stat-raw"></span></div>
        <div class="stat"><span class="stat-label" data-i18n="statReadMatch"></span><span id="stat-read"></span></div>
        <div class="stat"><span class="stat-label" data-i18n="statDomLocate"></span><span id="stat-dom"></span></div>
      </div>
    </details>

    <section id="history" class="history-panel" hidden data-i18n-attr="aria-label:historyAriaLabel">
      <header class="history-header">
        <div class="history-title-row">
          <span class="eyebrow" data-i18n="eyebrowLibrary"></span>
          <span class="history-heading" data-i18n="historyHeading"></span>
        </div>
        <button
          id="history-close"
          class="icon-button"
          type="button"
          data-i18n-attr="aria-label:btnCloseHistoryAriaLabel;title:btnCloseHistoryTitle"
        >×</button>
      </header>
      <div class="history-bulk-actions">
        <button id="history-export-all" type="button" data-i18n="btnHistoryExportAllJson"></button>
        <button id="history-clear-all" type="button" class="history-action-danger" data-i18n="btnClearAll"></button>
      </div>
      <div id="history-list" class="history-list"></div>
      <p id="history-empty" class="history-empty" hidden data-i18n="historyEmptyMessage"></p>
    </section>

    <section id="cards"></section>
    <div id="card-menu" class="card-menu" role="menu" data-i18n-attr="aria-label:cardMenuAriaLabel" hidden></div>

    <script type="module" src="sidepanel.js"></script>
  </body>
</html>
