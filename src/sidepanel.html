<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <title>Parallel Reader</title>
    <link rel="stylesheet" href="sidepanel.css" />
  </head>
  <body>
    <section id="action" class="action-panel">
      <div class="action-copy">
        <div class="eyebrow">Now reading</div>
        <p id="status" aria-live="polite">未开始</p>
      </div>
      <div class="action-controls">
        <label class="theme-picker" title="切换界面风格">
          <span class="theme-picker-label" aria-hidden="true">风格</span>
          <select id="theme-select" aria-label="界面风格">
            <option value="paper">纸本</option>
            <option value="dark">深色</option>
            <option value="cloud">Claude</option>
          </select>
        </label>
        <label class="debug-toggle" title="显示抽取和定位诊断">
          <input id="debug-mode" type="checkbox" />
          <span>调试</span>
        </label>
        <button id="settings-toggle" class="icon-button" type="button" aria-label="设置" title="设置">⚙</button>
        <button id="analyze" class="primary-action" type="button">分析当前页</button>
      </div>
    </section>

    <button id="analyze-hero" class="hero-action" type="button" hidden>
      <span class="hero-action-label">分析当前页</span>
      <span class="hero-action-hint">快捷键 Alt+Shift+R</span>
    </button>

    <section id="settings" class="settings-panel" hidden>
      <p class="settings-note">
        本地模式：API Key 只保存在当前 Chrome。公开发布前需要改为后端或临时凭证方案。
      </p>
      <button id="history-open" class="settings-secondary" type="button">📚 查看历史</button>
      <label>API Key
        <input id="api-key" type="password" placeholder="sk-..." autocomplete="off" />
      </label>
      <label>Base URL
        <input id="base-url" type="text" />
      </label>
      <label>Model
        <input id="model" type="text" />
      </label>
      <label>Cards 数量
        <span class="row">
          <input id="min-cards" type="number" min="1" />
          <span>—</span>
          <input id="max-cards" type="number" min="1" />
        </span>
      </label>
      <label>摘要语言
        <select id="summary-language">
          <option value="zh-CN">中文</option>
          <option value="en">English</option>
        </select>
      </label>
      <label>信息密度
        <select id="card-density">
          <option value="concise">精简</option>
          <option value="normal">标准</option>
          <option value="detailed">详细</option>
        </select>
      </label>
      <label>截断字数
        <input id="max-doc" type="number" min="500" step="500" />
      </label>
      <label>缓存保留天数
        <input id="cache-ttl-days" type="number" min="1" max="90" step="1" />
      </label>
      <p id="settings-error" class="settings-error" role="alert" hidden></p>
      <button id="settings-save" type="button">保存</button>
      <div class="cache-controls">
        <div class="cache-controls-title">缓存管理</div>
        <div class="cache-controls-row">
          <button id="cache-clear-current" type="button">清除当前页缓存</button>
          <span id="cache-clear-current-confirm" class="cache-confirm" hidden>
            <span>确定清除？</span>
            <button id="cache-clear-current-yes" type="button">确认</button>
            <button id="cache-clear-current-no" type="button">取消</button>
          </span>
        </div>
        <div class="cache-controls-row">
          <button id="cache-clear-all" type="button">清除全部缓存页面</button>
          <span id="cache-clear-all-confirm" class="cache-confirm" hidden>
            <span>确定清除全部？</span>
            <button id="cache-clear-all-yes" type="button">确认</button>
            <button id="cache-clear-all-no" type="button">取消</button>
          </span>
        </div>
        <p id="cache-status" class="cache-status" aria-live="polite"></p>
      </div>
    </section>

    <section id="stale-cache-banner" class="stale-cache-banner" role="status" hidden>
      <span class="stale-cache-text">页面内容自上次分析后已变化。是否重新分析？</span>
      <button id="stale-cache-rerun" type="button">重新分析</button>
    </section>

    <section id="meta" class="page-state" hidden>
      <div class="page-title-row">
        <span class="meta-label">Page</span>
        <span id="meta-title"></span>
      </div>
      <div class="page-url" id="meta-url"></div>
      <div class="metric-strip debug-only">
        <div class="meta-row"><span class="meta-label">Text</span><span id="meta-selected-len"></span></div>
        <div class="meta-row"><span class="meta-label">Source</span><span id="meta-used"></span></div>
      </div>
      <div id="meta-quality" class="meta-quality debug-only" hidden></div>
    </section>

    <details id="stats" class="diagnostics debug-only" hidden>
      <summary>阅读诊断</summary>
      <div class="diagnostic-grid">
        <div class="stat"><span class="stat-label">原文长度</span><span id="meta-raw-len"></span></div>
        <div class="stat"><span class="stat-label">正文长度</span><span id="meta-read-len"></span></div>
        <div class="stat"><span class="stat-label">原文匹配</span><span id="stat-raw"></span></div>
        <div class="stat"><span class="stat-label">正文匹配</span><span id="stat-read"></span></div>
        <div class="stat"><span class="stat-label">页面定位</span><span id="stat-dom"></span></div>
      </div>
    </details>

    <section id="history" class="history-panel" hidden aria-label="历史记录">
      <header class="history-header">
        <div class="history-title-row">
          <span class="eyebrow">Library</span>
          <span class="history-heading">历史记录</span>
        </div>
        <button id="history-close" class="icon-button" type="button" aria-label="关闭历史" title="返回">×</button>
      </header>
      <div class="history-bulk-actions">
        <button id="history-export-all" type="button">导出 JSON</button>
        <button id="history-clear-all" type="button" class="history-action-danger">清空全部</button>
      </div>
      <div id="history-list" class="history-list"></div>
      <p id="history-empty" class="history-empty" hidden>No analyzed pages yet. Open a page and click Analyze.</p>
    </section>

    <section id="cards"></section>
    <div id="card-menu" class="card-menu" role="menu" aria-label="卡片操作" hidden></div>

    <script type="module" src="sidepanel.js"></script>
  </body>
</html>
